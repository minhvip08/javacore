# SLF4J Configuration for Testing
#
# Set root level to INFO to see test progress
# Set DEBUG for CalculatorServer and Client to see detailed RPC operations
#
org.slf4j.simpleLogger.defaultLogLevel=INFO
org.slf4j.simpleLogger.log.com.simi=DEBUG
org.slf4j.simpleLogger.log.org.apache.thrift=WARN

# Enable timestamps
org.slf4j.simpleLogger.showDateTime=true
org.slf4j.simpleLogger.dateTimeFormat=yyyy-MM-dd HH:mm:ss.SSS

# Show thread names
org.slf4j.simpleLogger.showThreadName=true
